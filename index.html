<!DOCTYPE html>
<html>
<head>
    <title>Mystic Leapfall</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(#87CEEB, #cceeff);
        }

        #game {
            position: relative;
            width: 800px;
            height: 400px;
            margin: auto;
            background: linear-gradient(#87CEEB, #cceeff);
            overflow: hidden;
            border: 3px solid black;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        #player {
            position: absolute;
            width: 40px;
            height: 60px;
            background: red;
            bottom: 20px;
            left: 100px;
        }

        #enemy {
            position: absolute;
            width: 40px;
            height: 40px;
            background: green;
            bottom: 20px;
            left: 600px;
        }

        #ground {
            position: absolute;
            width: 100%;
            height: 20px;
            bottom: 0;
            background: #654321;
        }
    </style>
</head>
<body>

<div id="game">
    <div class="cloud" style="width:80px;height:50px;top:60px;left:100px;"></div>
    <div class="cloud" style="width:100px;height:60px;top:100px;left:300px;"></div>

    <div id="player"></div>
    <div id="enemy"></div>
    <div id="ground"></div>
</div>

<script src="game.js"></script>

</body>
</html>
