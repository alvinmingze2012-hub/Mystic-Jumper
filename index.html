<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Leapfall - 2D Platformer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Mystic Leapfall</h1>
            <div class="game-stats">
                <div class="stat">Score: <span id="score">0</span></div>
                <div class="stat">Lives: <span id="lives">3</span></div>
                <div class="stat">Level: <span id="level">1</span></div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="game-controls">
            <div class="controls-info">
                <h3>Controls:</h3>
                <p>A/← - Move Left | D/→ - Move Right | Space - Jump | Shift - Dash | ESC - Pause</p>
            </div>
            <button id="startButton">Start Game</button>
            <button id="pauseButton">Pause</button>
        </div>
        
        <div class="power-up-indicator">
            <div id="powerUp">No Power-Up</div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
